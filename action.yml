name: ci-medic
description: AI triage for failed CI runs
inputs:
  github-token: {required: true}
  api-key:      {required: false}
  model:        {required: false, default: ''}
  base-url:     {required: false, default: ''}
runs:
  using: docker
  image: docker://ghcr.io/alitariq4589/ci-medic:v0.1.0
  args:
  - github
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    CI_MEDIC_API_KEY: ${{ inputs.api-key }}
    CI_MEDIC_MODEL: ${{ inputs.model }}
    CI_MEDIC_BASE_URL: ${{ inputs.base-url }}